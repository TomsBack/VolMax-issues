name: Feature Request
description: Suggest a new feature or improvement
labels: ["enhancement"]
body:
  - type: textarea
    id: description
    attributes:
      label: What would you like to see?
      description: Describe the feature or improvement.
      placeholder: I'd love it if VolMax could...
    validations:
      required: true

  - type: textarea
    id: use-case
    attributes:
      label: Why is this useful?
      description: Explain the problem this would solve or the use case.
      placeholder: This would help when...

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any workarounds or alternative solutions you've tried?

  - type: textarea
    id: extra
    attributes:
      label: Additional context
      description: Screenshots, mockups, or links to similar features in other extensions.
